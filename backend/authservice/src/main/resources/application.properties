# =============================================
# 🌐 APPLICATION CONFIGURATION
# =============================================

# Allow bean overriding to fix duplicate repository issue
spring.main.allow-bean-definition-overriding=true

# 🌐 MongoDB Atlas Connection
spring.data.mongodb.uri=${MONGODB_URI}

# 🔐 JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=43200000

# 🌍 Server Port
server.port=8081
server.servlet.context-path=/api

# 🛠️ Debug Mode (during development)
debug=true

# 🌱 Startup Cleanup
spring.main.banner-mode=off
spring.application.admin.enabled=true

# SMS Server Configuration - Use your phone's current IP
sms.server.url=http://192.168.2.100:5000/send-sms
# RestTemplate timeout configuration
rest.template.connect-timeout=5000
rest.template.read-timeout=15000

# =============================================
# 🕐 TIMEZONE CONFIGURATION
# =============================================
spring.jackson.time-zone=Asia/Manila
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================
# 🎯 CORS CONFIGURATION (Development)
# =============================================
cors.allowed-origins=http://localhost:3000,https://starwashph.com,https://www.starwashph.com

# =============================================
# 🤖 GEMINI AI CONFIGURATION
# =============================================
gemini.api.key=${GEMINI_API_KEY}